# DataFlow Finance — centralized tool configuration
# ruff, mypy, and pytest are all configured here so CLI calls and Makefile
# commands pick up the same settings without duplicating flags.

[tool.ruff]
target-version = "py311"
line-length = 100
exclude = ["__pycache__", ".mypy_cache", ".ruff_cache", "output", "logs"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
]
ignore = [
    "B008",  # do not perform function calls in default arguments (FastAPI Depends pattern)
    "E501",  # line too long — handled by formatter
]

[tool.ruff.lint.isort]
known-first-party = ["etl_service"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
strict = false
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
exclude = ["output/", "logs/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
python_files = ["test_*.py"]
python_functions = ["test_*"]
